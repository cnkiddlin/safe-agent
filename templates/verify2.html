<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>IBM Verify - Review request for consent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
            color: #161616;
        }
        .page-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .page-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .left-panel {
            flex: 1;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .illustration-container {
            position: relative;
            width: 320px;
            height: 240px;
        }
        .laptop {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 270px;
            height: 180px;
            border: 2px solid #161616;
            border-radius: 8px 8px 0 0;
            background-color: #ffffff;
            padding: 10px;
        }
        .screen {
            width: 100%;
            height: 100%;
            border: 1px solid #e0e0e0;
            background-color: #f4f4f4;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .screen-dot {
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #161616;
            border-radius: 50%;
        }
        .input-mock { width: 130px; height: 12px; border: 1px solid #a8a8a8; background-color: #ffffff; }
        .password-mock { font-size: 8px; letter-spacing: 2px; color: #a8a8a8; padding-left: 4px; line-height: 10px; }
        .btn-mock { width: 45px; height: 14px; background-color: #cccccc; align-self: flex-end; margin-right: 42px; }
        .laptop-base {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 10px;
            border: 2px solid #161616;
            background-color: #ffffff;
            border-radius: 0 0 4px 4px;
        }
        .laptop-base::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 4px;
            border: 2px solid #161616;
            border-top: none;
            background-color: #f4f4f4;
        }
        .right-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 60px 10% 40px 60px;
            max-width: 650px;
            animation: slideFadeIn 0.5s ease-out;
        }
        @keyframes slideFadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .brand { font-size: 12px; font-weight: 400; color: #525252; margin-bottom: 24px; letter-spacing: 0.5px; text-transform: uppercase; }
        .welcome { font-size: 14px; font-weight: 600; color: #161616; margin-bottom: 4px; }
        .title { font-size: 28px; font-weight: 300; color: #161616; margin-bottom: 24px; letter-spacing: -0.5px; }
        .login-info { font-size: 14px; color: #525252; margin-bottom: 14px; }
        .login-info a { color: #0f62fe; text-decoration: none; }
        .login-info a:hover { text-decoration: underline; }
        .description { font-size: 14px; color: #161616; margin-bottom: 20px; line-height: 1.4; }
        .description strong { font-weight: 600; }
        .consent-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 36px;
        }
        .consent-item {
            display: flex;
            align-items: flex-start;
            font-size: 13px;
            color: #161616;
            cursor: pointer;
            user-select: none;
        }
        .consent-item input { position: absolute; opacity: 0; }
        .checkmark {
            height: 16px;
            width: 16px;
            background-color: #ffffff;
            border: 2px solid #161616;
            margin-right: 10px;
            position: relative;
            flex-shrink: 0;
            transition: background-color 0.15s;
        }
        .consent-item input:checked ~ .checkmark { background-color: #161616; }
        .checkmark::after {
            content: "";
            position: absolute;
            display: none;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .consent-item input:checked ~ .checkmark::after { display: block; }
        .label-text { line-height: 16px; }
        .button-group { display: flex; align-items: center; gap: 24px; }
        .btn-continue {
            background-color: #0f62fe;
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.1s;
            position: relative;
        }
        .btn-continue:hover { background-color: #0353e9; }
        .btn-continue:disabled {
            background-color: #c6c6c6;
            cursor: not-allowed;
        }
        .btn-cancel { color: #0f62fe; text-decoration: none; font-size: 14px; cursor: pointer; }
        .btn-cancel:hover { text-decoration: underline; }
        /* continue spinner */
        .btn-spinner { display: none; }
        .btn-spinner svg {
        }
        .btn-continue.loading .btn-spinner { display: inline-block; }
        .btn-continue.loading .btn-label { display: none; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .left-panel { padding: 60px 20px; }
            .right-panel { padding: 40px 24px; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page-overlay" id="pageOverlay"></div>
    <div class="left-panel">
        <div class="illustration-container">
            <div class="laptop">
                <div class="screen">
                    <div class="screen-dot"></div>
                    <div class="input-mock"></div>
                    <div class="input-mock password-mock">•••••</div>
                    <div class="btn-mock"></div>
                </div>
            </div>
            <div class="laptop-base"></div>
        </div>
    </div>
    <div class="right-panel">
        <div class="brand">IBM Security Verify</div>
        <div class="welcome">Welcome, Zhang San</div>
        <h1 class="title">Review request for consent</h1>
        <div class="login-info">
            You logged in as <strong>San.Zhang@ibm.com</strong>. <a href="#">This is not me</a>
        </div>
        <div class="description">
            Before you continue, review and respond to the following requests from <strong>Agentic Order Platform</strong>:
        </div>
        <div class="consent-list">
            <label class="consent-item"><input type="checkbox" checked><span class="checkmark"></span><span class="label-text">Generate ID token for application</span></label>
            <label class="consent-item"><input type="checkbox" checked><span class="checkmark"></span><span class="label-text">Profile Information</span></label>
            <label class="consent-item"><input type="checkbox" checked><span class="checkmark"></span><span class="label-text">Email address</span></label>
            <label class="consent-item"><input type="checkbox" checked><span class="checkmark"></span><span class="label-text">Allow the Agentic AI to act on your behalf</span></label>
        </div>
        <div class="button-group">
            <button class="btn-continue" id="continueBtn" onclick="handleContinue()">
                <span class="btn-label">Continue</span>
                <span class="btn-spinner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle">
                        <circle cx="12" cy="12" r="10" stroke-dasharray="30 70" stroke-linecap="round"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></circle>
                    </svg>
                </span>
            </button>
            <a class="btn-cancel" onclick="navigateAway()">Cancel</a>
        </div>
    </div>
    <script>
        function navigateWithTransition(url) {
            const overlay = document.getElementById('pageOverlay');
            overlay.classList.add('active');
            setTimeout(() => { window.location.href = url; }, 350);
        }
        function navigateAway() {
            navigateWithTransition('/verify1');
        }
        async function handleContinue() {
            const btn = document.getElementById('continueBtn');
            if (btn.classList.contains('loading')) return;
            btn.classList.add('loading');
            btn.disabled = true;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                const data = await res.json();
                if (data.success) {
                    // Successfully logged in, redirect to main app
                    // 模拟授权处理延迟，让流程更真实
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    navigateWithTransition('/?login=success');
                } else {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    alert('Login failed. Please try again.');
                }
            } catch (e) {
                btn.classList.remove('loading');
                btn.disabled = false;
                alert('Network error. Please try again.');
            }
        }
    </script>
</body>
</html>
