<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单助手</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Verify3 左侧验证面板 */
.verify3-overlay {
    visibility: hidden;
    opacity: 0;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 10000;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    transition: opacity 0.3s ease, visibility 0.3s ease;
}
.verify3-overlay.show {
    visibility: visible;
    opacity: 1;
}
.verify3-panel {
    position: absolute;
    top: 24px;
    left: 24px;
    bottom: 16px;
    width: 380px;
    max-width: calc(100vw - 32px);
            background: #ffffff;
            border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    overflow: hidden;
    transform: translateX(-120%);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
.verify3-overlay.show .verify3-panel {
    transform: translateX(0);
}
.verify3-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }
    </style>
</head>
<body>

<!-- ====== 登录页面 ====== -->
<div id="loginPage" class="login-page" style="{{ '' if not logged_in else 'display:none;' }}">
    <div class="login-bg-glow"></div>
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-ring">
                <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="#0066CC" stroke-width="2" fill="#EFF6FF"/>
                    <rect x="13" y="17" width="22" height="18" rx="3" stroke="#0066CC" stroke-width="2" fill="white"/><path d="M13 22h22" stroke="#0066CC" stroke-width="1.5"/><path d="M24 17v9" stroke="#0066CC" stroke-width="2.5"/>
                </svg>
            </div>
            <h1>订单助手</h1>
            <p class="login-subtitle">智能订单管理</p>
        </div>
        <button id="loginBtn" class="btn-login-sso" onclick="handleLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            登录
        </button>
    </div>
</div>

<!-- ====== 主界面 ====== -->
<div id="mainApp" class="main-app" style="display:{{ 'flex' if logged_in else 'none' }};">
    <!-- 顶部导航栏 -->
    <header class="app-header">
        <div class="header-left">
            <div class="header-logo">
                <svg width="22" height="22" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="#fff" stroke-width="2" fill="rgba(255,255,255,0.12)"/>
                    <rect x="13" y="17" width="22" height="18" rx="3" stroke="#fff" stroke-width="2" fill="transparent"/><path d="M13 22h22" stroke="#fff" stroke-width="1.5"/><path d="M24 17v9" stroke="#fff" stroke-width="2.5"/>
                </svg>
            </div>
            <span class="app-title">订单助手</span>
            <button class="header-btn header-btn-new" onclick="newChat()" title="新建对话">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="toggleMCP()" title="MCP 工具管理">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
                <span>工具</span>
            </button>
            <button class="header-btn" onclick="toggleLogs()" title="Agent 日志">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>Agent 日志</span>
            </button>
            <div class="header-divider"></div>
            <button class="header-btn" onclick="toggleUserInfo()" title="用户信息">
                <div class="avatar-mini" id="headerAvatar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
            </button>
            <button class="header-btn header-btn-logout" onclick="logout()" title="退出">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主体 -->
    <div class="app-body">
        <!-- 聊天区域 -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message welcome-message">
                    <div class="message-avatar avatar-assistant">
                        <svg width="18" height="18" viewBox="0 0 48 48" fill="none">
                            <circle cx="24" cy="24" r="22" stroke="#0066CC" stroke-width="2" fill="#EFF6FF"/>
                            <rect x="13" y="17" width="22" height="18" rx="3" stroke="#0066CC" stroke-width="2" fill="white"/><path d="M13 22h22" stroke="#0066CC" stroke-width="1.5"/><path d="M24 17v9" stroke="#0066CC" stroke-width="2.5"/>
                        </svg>
                    </div>
                    <div class="message-content">
                        <p>您好！我是智能订单助手，有什么可以帮您的？</p>
                        <p class="msg-hint">我可以帮您查询订单，或者执行新建、删除等一系列操作</p>
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea id="chatInput" class="chat-input" rows="1" placeholder="输入消息，Enter 发送..." onkeydown="handleInputKeydown(event)"></textarea>
                    <button class="btn-send" onclick="sendMessage()" id="sendBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="side-panel" id="sidePanel">
            <!-- MCP 面板 -->
            <div class="panel-content" id="mcpPanel" style="display:none;">
                <div class="panel-header">
                    <h3>MCP 工具</h3>
                    <button class="panel-close" onclick="toggleMCP()">✕</button>
                </div>
                <div class="panel-body">
                    <div class="panel-section">
                        <h4>添加工具</h4>
                        <div class="input-group">
                            <input type="text" id="mcpName" placeholder="工具名称" class="input-sm">
                            <input type="text" id="mcpUrl" placeholder="服务 URL（可选）" class="input-sm">
                        </div>
                        <textarea id="mcpDesc" class="input-sm" rows="2" placeholder="功能描述"></textarea>
                        <button class="btn btn-primary btn-sm btn-full" onclick="addMCPTool()">+ 添加</button>
                    </div>
                    <div class="panel-section">
                        <h4>已注册工具</h4>
                        <div id="mcpToolList" class="tool-list"></div>
                    </div>
                </div>
            </div>

            <!-- 日志面板 -->
            <div class="panel-content" id="logPanel" style="display:none;">
                <div class="panel-header">
                    <h3>Agent 日志</h3>
                    <div class="panel-actions">
                        <button class="panel-action-btn" onclick="clearLogs()">清空</button>
                        <button class="panel-close" onclick="toggleLogs()">✕</button>
                    </div>
                </div>
                <div class="panel-body log-panel-body" id="logPanelBody">
                    <div class="log-list" id="logList"></div>
                </div>
            </div>

            <!-- 用户信息面板 -->
            <div class="panel-content" id="userPanel" style="display:none;">
                <div class="panel-header">
                    <h3>用户信息</h3>
                    <button class="panel-close" onclick="toggleUserInfo()">✕</button>
                </div>
                <div class="panel-body">
                    <div id="userInfoContent" class="user-info-content">
                        <div class="user-avatar-large" id="userAvatarLarge">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0066CC" stroke-width="1.5">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="user-name-display" id="udDisplayName">张三</div>
                        <div class="user-role-tag" id="udRoles">管理员</div>
                        <div class="user-detail">
                            <div class="detail-row"><span class="detail-label">用户名</span><span class="detail-value" id="display_name">-</span></div>
                            <div class="detail-row"><span class="detail-label">用户 ID</span><span class="detail-value" id="employee_id">-</span></div>
                            <div class="detail-row"><span class="detail-label">邮箱</span><span class="detail-value" id="email">-</span></div>
                            <div class="detail-row"><span class="detail-label">JWT 签发者</span><span class="detail-value" id="jwt_issuer">-</span></div>
                            <div class="detail-row"><span class="detail-label">JWT 主题</span><span class="detail-value" id="jwt_subject">-</span></div>
                            <div class="detail-row"><span class="detail-label">状态</span><span class="detail-value" id="status">-</span></div>
                            <div class="detail-row"><span class="detail-label">上次登录</span><span class="detail-value" id="lastest_login">-</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- ====== Verify3 左侧验证面板 ====== -->
    <div class="verify3-overlay" id="verify3Overlay">
        <div class="verify3-panel">
        <iframe class="verify3-iframe" id="verify3Iframe" src="/verify3" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>

<script src="/static/app.js"></script>
</body>
</html>
